<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prestige Estates | 3D Property Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0A0A0B; color: #fff; font-family: 'Inter', sans-serif; }
      #root:empty { display: flex; align-items: center; justify-content: center; }
      #root:empty::after { content: 'Loading Prestige Estates...'; color: #C9A84C; font-size: 18px; font-family: 'Playfair Display', serif; animation: pulse 1.5s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0A0A0B;color:#fff;font-family:'Inter',sans-serif;text-align:center;padding:40px;">
        <div>
          <h2 style="font-family:'Playfair Display',serif;margin-bottom:12px;">JavaScript Required</h2>
          <p style="color:#A0A0A8;">Please enable JavaScript to view the 3D Property Viewer.</p>
        </div>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
